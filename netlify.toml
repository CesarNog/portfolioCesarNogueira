# Netlify build config — cesarnogueira.tech
#
# Static Next.js export (output: "export"). Netlify serves web/out directly.
# No Next.js runtime or plugin required.
#
# SETUP: In Netlify dashboard → Site settings → Environment variables, add:
#   GROK_API_KEY   = xai-...   (AI career assistant)
#   RESEND_API_KEY = re_...    (contact form emails)
#
# DOMAIN: In Netlify dashboard → Domain management, add custom domain:
#   cesarnogueira.tech
# DNS: point A record (or CNAME) to Netlify's load balancer.
# The old static site is preserved in old-website/ for reference.

[build]
  base    = "web"
  command = "npm install --legacy-peer-deps && npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION  = "22"
  NPM_FLAGS     = "--legacy-peer-deps"

[functions]
  directory = "netlify/functions"

# SPA fallback — serves index.html for all non-asset routes (Next.js static export)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
