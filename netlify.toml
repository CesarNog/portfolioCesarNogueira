# Netlify build config — cesarnogueira.tech
#
# Static Next.js export (output: "export"). Netlify serves out/ directly.
# No Next.js runtime or plugin required.
#
# SETUP: In Netlify UI → Site settings → Environment variables, add:
#   GROK_API_KEY   = xai-...   (AI career assistant)
#   RESEND_API_KEY = re_...    (contact form emails)
#
# DOMAIN: In Netlify UI → Domain management, add custom domain:
#   cesarnogueira.tech

[build]
  command = "npm install --legacy-peer-deps && npm run build && mkdir -p out/curriculum && cp old-website/curriculum/CV_CesarANogueira_Cloud_EN_US.pdf out/curriculum/"
  publish = "out"

[build.environment]
  NODE_VERSION  = "22"
  NPM_FLAGS     = "--legacy-peer-deps"

[functions]
  directory = "netlify/functions"

# SPA fallback — serves index.html for all non-asset routes (Next.js static export)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
