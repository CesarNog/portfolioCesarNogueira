# Netlify build config — cesarnogueira.tech
#
# Static Next.js export (output: "export"). Netlify builds from web/ and serves web/out.
# No Next.js runtime or plugin required.
#
# SETUP: In Netlify UI → Site settings → Environment variables, add:
#   GROQ_API_KEY   = <your-groq-key>   (AI chatbot — free at console.groq.com)
#   RESEND_API_KEY = <your-resend-key> (contact form emails)
#
# DOMAIN: In Netlify UI → Domain management, add custom domain:
#   cesarnogueira.tech
# The old static site is preserved in old-website/ for reference.

[build]
  base    = "web"
  command = "npm install --legacy-peer-deps && npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION  = "22"
  NPM_FLAGS     = "--legacy-peer-deps"

[functions]
  directory = "netlify/functions"

# SPA fallback — serves index.html for all non-asset routes (Next.js static export)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
