name: CI

on:
  push:
    branches-ignore:
      - master
  pull_request:

jobs:
  type-check-and-lint:
    name: Type-check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint
